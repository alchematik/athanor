syntax = "proto3";

package alchematik.athanor.provider.v1;

message Schema {
  string name = 1;
  string version = 2;
  repeated ResourceSchema resources = 3;
}

message ResourceSchema {
  string type = 1;
  FieldSchema identifier = 2;
  FieldSchema config = 3;
  FieldSchema attrs = 4;
}

message FieldSchema {
  string name = 1;
  FieldType type = 2;
  repeated FieldSchema fields = 3;
  bool is_identifier = 4;
}

enum FieldType {
  EMPTY = 0;
  STRING = 1;
  STRUCT = 2;
  MAP = 3;
}

