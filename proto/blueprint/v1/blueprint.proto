syntax = "proto3";

package alchematik.athanor.blueprint.v1;

message Blueprint {
  repeated Stmt stmts = 1;
}

message Stmt {
  oneof type {
    ResourceStmt resource = 1;
    BuildStmt build = 2;
  }
}

message ResourceStmt {
  ResourceExpr resource = 1;
  ProviderExpr provider = 2;
  Expr exists = 3;
}

message BuildStmt {
  Translator translator = 1;
  BuildExpr build = 2;
}

message Expr {
  oneof type {
    string string_literal = 1;
    uint32 int_literal = 2;
    float float_literal = 3;
    bool bool_literal = 4;
    ListExpr list = 5;
    MapExpr map = 6;
    ProviderExpr provider = 7;
    ResourceExpr resource = 8;
    NilExpr nil = 9;
    GetExpr get = 10;
    ResourceIdentifierExpr resource_identifier = 11;
    BlueprintExpr blueprint = 12;
    FileExpr file = 13;
    GetRuntimeConfig get_runtime_config = 14;
    BuildExpr build = 15;
  }
}

message BlueprintExpr {
  repeated Stmt stmts = 1;
}

message ListExpr {
  repeated Expr elements = 1;
}

message MapExpr {
  map<string, Expr> entries = 1;
}

message FileExpr {
  string path = 1;
}

message GetExpr {
  string name = 1;
  Expr object = 2;
}

message GetRuntimeConfig {}

message NilExpr {}

message ProviderExpr {
  string name = 1;
  Source source = 3;
}

message ResourceExpr {
  Expr identifier = 1;
  Expr config = 2;
}

message ResourceIdentifierExpr {
  string alias = 1;
  string type = 2;
  Expr value = 3;
}

message BuildExpr {
  string alias = 1;
  Source source = 2;
  repeated Expr config = 4;
  Expr runtime_config = 5;
}

message Translator {
  string name = 1;
  Source source = 3;
}

message Source {
  oneof type {
    FilePathSource file_path = 1;
    GitHubReleaseSource git_hub_release = 2;
  }
}

message FilePathSource {
  string path = 1;
}

message GitHubReleaseSource {
  string repo_owner = 1;
  string repo_name = 2;
  string name = 3;
}
