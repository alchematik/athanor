syntax = "proto3";

package alchematik.athanor.translator.v1;

import "proto/blueprint/v1/blueprint.proto";

service Translator {
  rpc ReadProviderBlueprint(ReadProviderBlueprintRequest) returns (ReadProviderBluepintResponse);
}

message ReadProviderBlueprintRequest {
  string path = 1;

}

message ReadProviderBluepintResponse {
  alchematik.athanor.blueprint.v1.ProviderBlueprint blueprint = 1;
}
