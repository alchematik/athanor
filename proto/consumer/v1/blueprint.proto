syntax = "proto3";

package alchematik.athanor.consumer.v1;

message Blueprint {
  repeated Stmt stmts = 1;
}

message Stmt {
  oneof type {
    ResourceStmt resource = 1;
  }
}


message ResourceStmt {
  string name = 1;
  Expr identifier = 2;
  Expr config = 3; 
}

message Expr {
  oneof type {
    string string_literal = 1;
    uint32 int_literal = 2;
    float float_literal = 3;
    ListExpr list = 4;
    MapExpr map = 5;
    GetExpr get = 6;
    NilExpr nil = 7;
  }
}

message ListExpr {
  repeated Expr elements = 1;
}

message MapExpr {
  map<string, Expr> entries = 1;
}

message GetExpr {
  string name = 1;
  Expr object = 2;
}


message NilExpr {
}
