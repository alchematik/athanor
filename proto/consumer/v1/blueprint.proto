syntax = "proto3";

package alchematik.athanor.consumer.v1;

message Blueprint {
  repeated Stmt stmts = 1;
}

message Stmt {
  oneof type {
    ProviderStmt provider = 1;
    ResourceStmt resource = 2;
  }
}

message ProviderStmt {
  Expr identifier = 1;
}

message ResourceStmt {
  Expr identifier = 1;
  Expr provider = 2;
  Expr config = 3;
}

message Expr {
  oneof type {
    string string_literal = 1;
    uint32 int_literal = 2;
    float float_literal = 3;
    ListExpr list = 4;
    MapExpr map = 5;
    GetExpr get = 6;
    GetProviderExpr get_provider = 7;
    GetResourceExpr get_resource = 8;
    NilExpr nil = 9;
    IOGetExpr io_get = 10;
    ProviderIdentifierExpr provider_identifier = 11;
    ResourceIdentifierExpr resource_identifier = 12;
  }
}

message ListExpr {
  repeated Expr elements = 1;
}

message MapExpr {
  map<string, Expr> entries = 1;
}

message GetExpr {
  string name = 1;
  Expr object = 2;
}

message GetProviderExpr {
  string alias = 1;
}

message GetResourceExpr {
  string alias = 1;
}

message IOGetExpr {
  string name = 1;
  Expr object = 2;
}

message NilExpr {}

message ProviderIdentifierExpr {
  string alias = 1;
  Expr name = 2;
  Expr version = 3;
}

message ResourceIdentifierExpr {
  string alias = 1;
  string type = 2;
  Expr value = 3;
}
