syntax = "proto3";

package alchematik.athanor.consumer.v1;

message Blueprint {
  repeated Stmt stmts = 1;
}

message Stmt {
  oneof type {
    DeclareStmt declare = 1;
  }
}

message DeclareStmt {
  string alias = 1;
  Expr value = 2;
}


message Expr {
  oneof type {
    string string_literal = 1;
    uint32 int_literal = 2;
    float float_literal = 3;
    ListExpr list = 4;
    MapExpr map = 5;
    GetExpr get = 6;
    NilExpr nil = 7;
    ProviderExpr provider = 8;
    ResourceExpr resource = 9;
    IOGetExpr io_get = 10;
  }
}

message ListExpr {
  repeated Expr elements = 1;
}

message MapExpr {
  map<string, Expr> entries = 1;
}

message GetExpr {
  string name = 1;
  Expr object = 2;
}

message IOGetExpr {
  string name = 1;
  Expr object = 2;
}

message NilExpr {
}

message ProviderExpr {
  Expr name = 1;
  Expr version = 2;
}

message ResourceExpr {
  string type = 1;
  Expr provider = 2;
  Expr identifier = 3;
  Expr config = 4; 
}

