syntax = "proto3";

package alchematik.athanor.backend.v1;

import "google/protobuf/struct.proto";
/* import "proto/provider/v1/blueprint.proto"; */
import "proto/state/v1/state.proto";

service Backend {
  rpc GetResource(GetResourceRequest) returns (GetResourceResponse);
}

message GetResourceRequest {
  string type = 1;
  alchematik.athanor.state.v1.Value identifier = 2;
}

message GetResourceResponse {
  alchematik.athanor.state.v1.Resource resource = 1;
}

