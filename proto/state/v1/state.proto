syntax = "proto3";

package alchematik.athanor.state.v1;

message Build {
  repeated State states = 1;
}

message State {
  oneof type {
    ResourceState resource = 1;
  }
}

message ResourceState {
  Value identifier = 1;
  Value config = 2;
  Value attrs = 3; 
}

message Value {
  oneof type {
    string string_value = 1;
    uint32 int_value = 2;
    float float_value = 3;
    ListValue list = 4;
    MapValue map = 5;
  }
}

message ListValue {
  repeated Value elements = 1;
}

message MapValue {
  map<string, Value> entries = 1;
}

