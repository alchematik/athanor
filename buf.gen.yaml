version: v1
managed:
  enabled: true
  go_package_prefix:
    default: github.com/alchematik/athanor/
plugins:
  - plugin: buf.build/protocolbuffers/go:v1.31.0
    out: internal/gen/go
    opt:
      - paths=source_relative
  - plugin: buf.build/grpc/go:v1.3.0
    out: internal/gen/go
    opt:
      - paths=source_relative
      - require_unimplemented_servers=false
